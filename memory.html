<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Memories 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      text-align: center;
      color: #333;
    }

    h1 {
      margin-top: 20px;
      color: white;
      text-shadow: 2px 2px 10px #000;
    }

    /* MUSIC BUTTON */
    button {
      margin: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    /* CARDS */
    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      width: 250px;
      height: 350px;
      perspective: 1000px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      transition: transform 0.8s;
      transform-style: preserve-3d;
      position: relative;
    }

    .card:hover .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
      overflow: hidden;
    }

    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-back {
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
      transform: rotateY(180deg);
    }

    /* NEXT BUTTON */
    .next {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 25px;
      background: #ff006e;
      color: white;
      text-decoration: none;
      border-radius: 25px;
    }
  </style>
</head>

<body>

<h1>Our Beautiful Memories 💖</h1>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="./song.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()" id="musicBtn">🎵 Play Our Song</button>

<!-- MEMORY CARDS -->
<div class="container">

  <div class="card">
    <div class="card-inner">
      <div class="card-front">
        <img src="naheeda.jpg" alt="">
      </div>
      <div class="card-back">
        <p>Our first special memory 💖</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-inner">
      <div class="card-front">
        <img src="us1.jpg" alt="">
      </div>
      <div class="card-back">
        <p>That beautiful moment together 🌸</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-inner">
      <div class="card-front">
        <img src="us2.jpg" alt="">
      </div>
      <div class="card-back">
        <p>You mean everything to me 💕</p>
      </div>
    </div>
  </div>

</div>

<!-- NEXT PAGE -->
<a class="next" href="surprise.html">One Last Surprise ➜</a>

<!-- MUSIC SCRIPT -->
<script>
let music = document.getElementById("bgMusic");
let isPlaying = false;

function toggleMusic() {
    if (!isPlaying) {
        music.play()
        .then(() => {
            isPlaying = true;
            document.getElementById("musicBtn").innerText = "⏸ Pause Music";
        })
        .catch(() => {
            alert("Click again to play music");
        });
    } else {
        music.pause();
        isPlaying = false;
        document.getElementById("musicBtn").innerText = "🎵 Play Our Song";
    }
}
</script>

</body>
</html>
