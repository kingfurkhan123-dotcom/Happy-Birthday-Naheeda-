<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Memories 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  text-align: center;
  color: white;
  overflow-x: hidden;
}

/* HEADER */
h1 {
  margin-top: 25px;
  font-size: 32px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

/* MUSIC BUTTON */
button {
  padding: 10px 20px;
  margin: 15px;
  border: none;
  border-radius: 25px;
  background: #ff4d6d;
  color: white;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 20px;
}

/* CARD */
.card {
  width: 260px;
  height: 340px;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.9s;
  transform-style: preserve-3d;
}

.card:hover .inner {
  transform: rotateY(180deg);
}

/* FRONT + BACK */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  backface-visibility: hidden;
  overflow: hidden;
}

/* IMAGE */
.front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BACK SIDE */
.back {
  background: white;
  color: #333;
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15px;
  text-align: center;
}

/* HEART FLOATING EFFECT */
.heart {
  position: fixed;
  bottom: -10px;
  color: #ff4d6d;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* NEXT BUTTON */
.next {
  display: inline-block;
  margin: 25px;
  padding: 12px 25px;
  background: #ff006e;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h1>Our Beautiful Memories 💖</h1>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🎵 Play / Pause Music</button>

<!-- CARDS -->
<div class="container">

  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="naheeda.jpg">
      </div>
      <div class="back">
        Our first special moment 💖
      </div>
    </div>
  </div>

  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="us1.jpg">
      </div>
      <div class="back">
        The day everything felt special 🌸
      </div>
    </div>
  </div>

  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="us2.jpg">
      </div>
      <div class="back">
        You mean everything to me 💕
      </div>
    </div>
  </div>

</div>

<a class="next" href="story.html">⬅ Back</a>
<a class="next" href="surprise.html">Next Surprise ➜</a>

<script>
let music = document.getElementById("music");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}

/* HEART ANIMATION */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
