<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Memories 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      margin: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .card {
      width: 250px;
      height: 320px;
      perspective: 1000px;
    }

    .inner {
      width: 100%;
      height: 100%;
      transition: 0.8s;
      transform-style: preserve-3d;
      position: relative;
    }

    .card:hover .inner {
      transform: rotateY(180deg);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
      overflow: hidden;
    }

    .front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .back {
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      transform: rotateY(180deg);
      text-align: center;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #ff006e;
      color: white;
      text-decoration: none;
      border-radius: 25px;
    }
  </style>
</head>

<body>

<h1>Our Beautiful Memories 💖</h1>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🎵 Play Music</button>

<!-- CARDS -->
<div class="container">

  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="naheeda.jpg">
      </div>
      <div class="back">
        Our first beautiful memory 💖
      </div>
    </div>
  </div>

  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="us1.jpg">
      </div>
      <div class="back">
        Special moment together 🌸
      </div>
    </div>
  </div>

  <div class="card">
    <div class="inner">
      <img class="front" src="us2.jpg">
      <div class="back">
        You mean everything 💕
      </div>
    </div>
  </div>

</div>

<a href="story.html">⬅ Back</a>
<a href="surprise.html">Next Surprise ➜</a>

<script>
let music = document.getElementById("music");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}
</script>

</body>
</html>
