<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Memories 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  text-align: center;
  color: white;
}

/* TITLE */
h1 {
  margin-top: 20px;
}

/* MUSIC BUTTON */
button {
  padding: 10px 20px;
  margin: 15px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

/* CARDS CONTAINER */
.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 20px;
}

/* FLIP CARD */
.card {
  width: 250px;
  height: 350px;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}

.card:hover .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 15px;
  overflow: hidden;
}

/* IMAGE */
.front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BACK (EMPTY FOR NOW) */
.back {
  background: white;
  color: black;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: rotateY(180deg);
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<h1>Our Beautiful Memories 💖</h1>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🎵 Play Music</button>

<!-- PHOTO CARDS ONLY -->
<div class="container">

  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="naheeda.jpg">
      </div>
      <div class="back">
        <!-- note will come later -->
      </div>
    </div>
  </div>

  <div class="card">
    <div class="inner">
      <div class="front">
        <img src="us1.jpg">
      </div>
      <div class="back">
        <!-- note will come later -->
      </div>
    </div>
  </div>

  <div class="card">
    <div class="inner">
      <img class="front" src="us2.jpg">
      <div class="back">
        <!-- note will come later -->
      </div>
    </div>
  </div>

</div>

<script>
let music = document.getElementById("music");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}
</script>

</body>
</html>
